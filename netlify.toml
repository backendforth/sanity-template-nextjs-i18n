# Netlify — Next.js app in `web/` (pnpm monorepo).
#
# Build runs from the repository root so pnpm can resolve workspace packages.
# In the Netlify UI, keep the base directory at the repo root unless you mirror this layout elsewhere.
#
# Set in Site settings → Environment variables (Build + Runtime as needed):
#   SANITY_STUDIO_PROJECT_ID  — required for Next ↔ Sanity
#   SANITY_STUDIO_DATASET     — optional if you pin a dataset
#   NEXT_PUBLIC_SANITY_*      — optional client fallbacks
# Full list: `web/.env.example`
#
# Publish directory (why not `dist/`?):
# - Next.js writes its build output to `.next/` (not `dist/` like Vite or a static export `out/`).
# - `@netlify/plugin-nextjs` / OpenNext reads that output and packages SSR, functions, and assets
#   for Netlify; the live site is not a single flat `dist` folder.
# - `publish = "web/.next"` is the path to that Next output relative to the repo root (monorepo).

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter web run build"
  publish = "web/.next"
  # Skip the build when the diff between HEAD and HEAD^ only touches files outside the
  # web app and its shared package. Saves Netlify minutes on Studio-only commits.
  ignore = "git diff --quiet HEAD^ HEAD ./web ./packages/sanity-dataset-resolve ./pnpm-lock.yaml ./pnpm-workspace.yaml ./package.json"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Raise if the Next.js build runs out of memory on Netlify.
  NODE_OPTIONS = "--max-old-space-size=8192"

# ── Security headers (baseline) ──────────────────────────────────────────────
#
# `X-Frame-Options` is intentionally NOT set: Sanity Presentation embeds the
# Next.js site inside an iframe (Studio domain → Next), and `DENY` would block
# preview in production. `Content-Security-Policy: frame-ancestors` supersedes
# `X-Frame-Options` in modern browsers and is the right place to allow Studio.
#
# Adjust the CSP `frame-ancestors` allow-list to match your hosted Studio URL
# and any custom Studio origins (e.g. via `SANITY_STUDIO_WEB_PREVIEW_ORIGINS`).
# The default below covers `localhost:3333`, `*.sanity.studio`, and `'self'`.
#
# `script-src 'unsafe-inline'` is required for the tiny synchronous lazy-fade
# script in `app/layout.tsx` (must run before first paint). To remove
# `'unsafe-inline'`, either move the script into a static file under `/public/`
# (one extra blocking roundtrip) or compute its SHA-256 and add `'sha256-…'`.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; img-src 'self' data: blob: https://cdn.sanity.io https://image.mux.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.api.sanity.io https://*.apicdn.sanity.io https://stream.mux.com https://image.mux.com; frame-src 'self' https://stream.mux.com https://*.sanity.studio; frame-ancestors 'self' http://localhost:3333 https://*.sanity.studio; worker-src 'self' blob:;"

# ── CDN Edge Cache ────────────────────────────────────────────────────────────
#
# Two-header pattern for Netlify's edge network:
#   Cache-Control          → browser: never cache HTML (always fresh from CDN)
#   Netlify-CDN-Cache-Control → Netlify edge: cache 1 year, SWR 1 day
#
# @netlify/plugin-nextjs coordinates this with Next.js ISR automatically:
# when revalidateTag() fires in a webhook, Netlify purges the matching
# Netlify-Cache-Tag entries at the edge — so editors see changes immediately.
#
# Result: first request hits the Serverless Function, every subsequent request
# is served from the nearest edge node in <20 ms.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=86400"

# Hashed static assets — content-addressed, safe to cache forever at both layers
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=600"

# App Router Route Handlers — never cache, override the /* rule above
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

# Minimal redirects
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
