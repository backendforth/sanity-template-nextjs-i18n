name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: format • typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Single Node line: Node 20 is EOL since April 2026, and tsc/Biome
          # results don't vary by Node version — runtime compat is covered by
          # the build jobs.
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      # Organization convention: run `biome check --write` (via `pnpm run format`)
      # rather than a read-only lint. Any unfixable issue fails the command; the
      # diff check below additionally catches auto-fixable changes that weren't
      # committed, so contributors know to run `pnpm run format` locally.
      - run: pnpm run format
      - name: Ensure formatter produced no changes
        run: git diff --exit-code
      - run: pnpm run typecheck
      # Wiring drift between schema, component, query, and type files is a
      # silent bug class — `pnpm gen:module` creates them atomically, but
      # hand-edits routinely miss a file. This gate catches partial wirings
      # before they reach main.
      - run: pnpm run check:wiring

  schema-typegen:
    name: schema typegen
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      # `sanity schema extract` loads sanity.config.ts, which throws without a
      # project id. The extracted schema is static (no API call), so a placeholder
      # is enough to let the config module load — same pattern as the build jobs.
      - run: pnpm --filter studio run generate
        env:
          SANITY_STUDIO_PROJECT_ID: ci-placeholder
      # Web typegen reads the (just-regenerated) `studio/schema.json` and the
      # `defineQuery` usages in `web/sanity/queries/**`. A placeholder project id
      # is enough — typegen never calls the Sanity API.
      - run: pnpm --filter web run generate
        env:
          SANITY_STUDIO_PROJECT_ID: ci-placeholder
      - name: Ensure schema typegen produced no changes
        run: git diff --exit-code

  build-web:
    name: build (web)
    runs-on: ubuntu-latest
    needs: [verify, schema-typegen]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web run build
        env:
          # Builds without a project must still succeed (starter). Real
          # deploys provide SANITY_STUDIO_PROJECT_ID via the host's env.
          NEXT_TELEMETRY_DISABLED: "1"

  build-studio:
    name: build (studio)
    runs-on: ubuntu-latest
    needs: [verify, schema-typegen]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter studio run build
